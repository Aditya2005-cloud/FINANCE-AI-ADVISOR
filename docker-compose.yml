services:
  pyramid:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: finance-ai-advisor:latest
    environment:
      APP_MODE: pyramid
    ports:
      - "6543:6543"

  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: finance-ai-advisor:latest
    environment:
      APP_MODE: fastapi
    ports:
      - "8000:8000"
